fast_config:
  checker: qwen:7b
  chunk_size: 1200
  editor: padauk-gemma:q8_0
  enabled: false
  num_ctx: 4096
  refiner: padauk-gemma:q8_0
  repeat_penalty: 1.3
  temperature: 0.2
  translator: padauk-gemma:q8_0
glossary_v3:
  alias_matching: true
  cache_ttl_minutes: 30
  enabled: false
  exception_rules: true
  include_examples: false
  lazy_load: true
  max_prompt_entries: 40
  path: data/glossary_v3.json
  priority_threshold: 2
  prompt_format: markdown
  show_exceptions_count: true
  show_pronunciation: false
  track_usage: true
model_roles:
  checker:
  - qwen:7b
  - gemma:7b
  - burmese-gpt:7b
  glossary_sync:
  - qwen:7b
  - burmese-gpt:7b
  qa_final:
  - qwen:7b
  - gemma:7b
  - burmese-gpt:7b
  refiner:
  - padauk-gemma:q8_0
  - burmese-gpt:7b
  - aya:8b
  - qwen:7b
  translator:
  - padauk-gemma:q8_0
  - burmese-gpt:7b
  - aya:8b
  - qwen:7b
model_router:
  enabled: true
  max_fallback_depth: 2
  retry_on_failure: true
  vram_budget_gb: 16.0
models:
  checker: qwen:7b
  cloud_model: gemini-2.5-flash
  editor: padauk-gemma:q8_0
  ollama_base_url: http://localhost:11434
  provider: ollama
  refiner: padauk-gemma:q8_0
  timeout: 300
  translator: padauk-gemma:q8_0
  # GPU Configuration - Supports NVIDIA (CUDA) and AMD (ROCm) GPUs
  # Set use_gpu: true to enable GPU acceleration
  use_gpu: true
  gpu_layers: -1  # -1 = auto (use all available layers), or specify number of layers to offload to GPU
  main_gpu: 0  # For multi-GPU setups, specify which GPU to use (0 = first GPU)
  
  # For AMD GPUs (like RX 580), you may need to set these environment variables:
  # export HSA_OVERRIDE_GFX_VERSION=10.1.0
  # export HCC_AMDGPU_TARGET=gfx803  # For RX 580 Polaris
  # export OLLAMA_GPU_OVERHEAD=1
  # Run 'python scripts/verify_gpu.py' to check your GPU setup
myanmar_readability:
  block_on_fail: false
  enabled: true
  flag_on_fail: true
  min_myanmar_ratio: 0.7
output:
  add_metadata: true
  add_translator_notes: false
  format: markdown
  preserve_formatting: true
paths:
  books_dir: books
  context_memory_file: data/context_memory.json
  glossary_file: data/glossary.json
  input_dir: data/input
  log_file: logs/translation.log
  output_dir: data/output
  templates_dir: templates
processing:
  chunk_overlap: 0
  chunk_size: 800
  max_retries: 2
  repeat_penalty: 1.15
  request_timeout: 300
  stream: true
  temperature: 0.2
  top_k: 40
  top_p: 0.95
project:
  name: novel_translation
  novel_genre: Xianxia/Cultivation
  source_language: en-US
  target_language: my-MM
qa_testing:
  auto_retry: false
  enabled: true
  fail_on_placeholders: false
  markdown_strict: true
  min_myanmar_ratio: 0.7
translation_pipeline:
  description: Single-stage EN->MM direct translation (optimized for padauk-gemma)
  mode: single_stage
  mode_description:
    fast: "2-stage pipeline: Translate \u2192 Quality (skip refinement)"
    fast_desc: "Fast optimized: CN\u2192EN\u2192MM pivot with quantized models (16GB\
      \ RAM)"
    full: "6-stage pipeline: Translate \u2192 Refine \u2192 Reflect \u2192 Quality\
      \ \u2192 Consistency \u2192 QA"
    lite: "3-stage pipeline: Translate \u2192 Refine \u2192 Quality"
    single_stage: "1-stage pipeline: Direct translation only"
  reflection_model: padauk-gemma:q8_0
  stage1_model: padauk-gemma:q8_0
  stage2_model: padauk-gemma:q8_0
  use_reflection: false
