# Pivot Language Configuration - FIXED VERSION
# Chinese → English → Myanmar (Two-stage pipeline)
# =====================================================
# ⚠️ IMPORTANT: Use this config ONLY for Chinese source files!
# For English sources, use settings.english.yaml instead!
#
# This config uses qwen2.5 models which correctly produce Myanmar output.
# The old config used seallms-v3-7b which produces THAI ❌

project:
  name: "novel_translation"
  source_language: "zh-CN"      # Chinese input
  target_language: "my-MM"      # Myanmar output
  novel_genre: "Xianxia/Cultivation"

# =====================================================
# MODEL CONFIGURATION - Working Pivot Pipeline
# =====================================================
# FIXED: Using qwen2.5 models that actually produce Myanmar output
# OLD (broken): seallms-v3-7b produces THAI ❌
# NEW (working): qwen2.5:14b produces Myanmar ✅

models:
  provider: "ollama"
  
  # Stage 1: Chinese → English
  # qwen2.5:14b has excellent Chinese understanding
  translator: "qwen2.5:14b"     # Chinese → English (9GB)
  
  # Stage 2: English → Myanmar  
  # qwen2.5:14b works well for English → Myanmar too
  editor: "qwen2.5:14b"         # English → Myanmar
  refiner: "qwen:7b"            # Refinement (4GB)
  checker: "qwen:7b"            # QA check (4GB)
  
  ollama_base_url: "http://localhost:11434"
  timeout: 300                  # API call timeout (5 minutes)

# =====================================================
# TWO-STAGE TRANSLATION PIPELINE
# =====================================================
translation_pipeline:
  mode: "two_stage"
  
  # Stage 1: Chinese → English (pivot)
  stage1_model: "qwen2.5:14b"
  stage1_source_lang: "chinese"
  stage1_target_lang: "english"
  
  # Stage 2: English → Myanmar (final output)
  stage2_model: "qwen2.5:14b"
  stage2_source_lang: "english"
  stage2_target_lang: "myanmar"
  
  description: "Pivot: CN→EN→MM using qwen2.5 (working models)"

# =====================================================
# PROCESSING SETTINGS
# =====================================================
processing:
  chunk_size: 1200              # Safe for 14B models
  overlap_size: 100             # Context continuity
  max_retries: 3
  temperature: 0.3              # Lower for more accurate translation
  top_p: 0.92
  top_k: 50
  repeat_penalty: 1.25          # Prevents repetition loops
  stream: true
  request_timeout: 300

# =====================================================
# PATHS
# =====================================================
paths:
  input_dir: "data/input"
  output_dir: "data/output"
  books_dir: "books"
  glossary_file: "data/glossary.json"
  context_memory_file: "data/context_memory.json"
  log_file: "logs/translation.log"
  templates_dir: "templates"

# =====================================================
# QUALITY SETTINGS
# =====================================================
myanmar_readability:
  enabled: true
  min_myanmar_ratio: 0.70       # 70% Myanmar characters required
  flag_on_fail: true
  block_on_fail: false

# =====================================================
# OUTPUT FORMAT
# =====================================================
output:
  format: "markdown"
  preserve_formatting: true
  add_metadata: true
  add_translator_notes: false

# =====================================================
# MODEL ROUTER
# =====================================================
model_router:
  enabled: true
  vram_budget_gb: 16.0
  retry_on_failure: true
  max_fallback_depth: 2

model_roles:
  translator: ["qwen2.5:14b", "qwen2.5:7b"]
  refiner: ["qwen2.5:14b", "qwen:7b"]
  checker: ["qwen:7b"]
  glossary_sync: ["qwen:7b"]
  qa_final: ["qwen:7b"]

# =====================================================
# QA SETTINGS
# =====================================================
qa_testing:
  enabled: true
  auto_retry: false
  min_myanmar_ratio: 0.70
  fail_on_placeholders: false
  markdown_strict: true

# =====================================================
# GLOSSARY V3 SETTINGS
# =====================================================
glossary_v3:
  enabled: true
  path: "data/glossary_v3.json"
  max_prompt_entries: 40
  priority_threshold: 2
  include_examples: false
  track_usage: true
  alias_matching: true
  exception_rules: true
  prompt_format: "markdown"
  show_pronunciation: false
  show_exceptions_count: true
  cache_ttl_minutes: 30
  lazy_load: true
