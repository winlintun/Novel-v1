# Pivot Language Configuration - USE AVAILABLE MODELS ONLY
# Chinese → English → Myanmar (Two-stage pipeline)
# =====================================================
# ⚠️ IMPORTANT: Use this config ONLY for Chinese source files!
# For English sources, use settings.english.yaml instead!
#
# UPDATED: Using models as specified in need_fix.md:
#   - Stage 1 (CN→EN): alibayram/hunyuan:7b (best for Chinese)
#   - Stage 2 (EN→MM): padauk-gemma:q8_0 OR yxchia/seallms-v3-7b:Q4_K_M
#   - Stage 3/4 (Checker/QA): qwen:7b (good at JSON and logic)

project:
  name: "novel_translation"
  source_language: "zh-CN"      # Chinese input
  target_language: "my-MM"      # Myanmar output
  novel_genre: "Xianxia/Cultivation"

# =====================================================
# MODEL CONFIGURATION - Using Recommended Models from need_fix.md
# =====================================================
# Recommended models per need_fix.md:
#   - alibayram/hunyuan:7b - Stage 1: CN→EN (excellent Chinese understanding)
#   - padauk-gemma:q8_0 OR yxchia/seallms-v3-7b:Q4_K_M - Stage 2: EN→MM
#   - qwen:7b - Stage 3/4: Checker/QA (JSON reading and logic checking)
# 
# NOTE: qwen2.5:14b and translategemma:12b should NOT be used (16GB RAM mismatch)
# NOTE: gemma:7b is NOT good for Myanmar

models:
  provider: "ollama"
  
  # Stage 1: Chinese → English (as per need_fix.md)
  translator: "alibayram/hunyuan:7b"
  
  # Stage 2: English → Myanmar
  # Option 1: padauk-gemma:q8_0 (local model)
  # Option 2: yxchia/seallms-v3-7b:Q4_K_M (if padauk not available)
  editor: "padauk-gemma:q8_0"
  refiner: "padauk-gemma:q8_0"
  
  # Stage 3 & 4: Checker/QA (as per need_fix.md)
  # qwen:7b is good at JSON and logic checking
  # DO NOT use for Myanmar text generation
  checker: "qwen:7b"
  
  ollama_base_url: "http://localhost:11434"
  timeout: 300                  # API call timeout (5 minutes)

# =====================================================
# TWO-STAGE TRANSLATION PIPELINE
# =====================================================
translation_pipeline:
  mode: "two_stage"
  
  # Stage 1: Chinese → English (pivot)
  stage1_model: "alibayram/hunyuan:7b"
  stage1_source_lang: "chinese"
  stage1_target_lang: "english"
  stage1_prompt: |
    You are an expert Chinese-to-English literary translator specializing in Wuxia/Xianxia novels.

    CRITICAL RULES:
    1. PRESERVE all Chinese names in pinyin (e.g., 罗青 → Luo Qing, 小戎镇 → Xiao Rong Town)
    2. PRESERVE all place names in pinyin
    3. PRESERVE all cultivation terms literally (e.g., 神仙 → immortal, 法力 → magical power)
    4. DO NOT translate names to English meanings - keep pinyin for proper nouns
    5. Output ONLY English translation, no explanations, no Chinese characters
    
    GLOSSARY (PRESERVE THESE NAMES IN PINYIN):
    {glossary}
    
    CHINESE TEXT:
    {text}
    
    ENGLISH TRANSLATION:
  
  # Stage 2: English → Myanmar (final output)
  stage2_model: "padauk-gemma:q8_0"
  stage2_source_lang: "english"
  stage2_target_lang: "myanmar"
  stage2_prompt: |
    CRITICAL LANGUAGE RULE — READ FIRST:
    - Output language: Myanmar (Burmese) ONLY.
    - Script: Myanmar Unicode (U+1000–U+109F). Example: မြန်မာဘာသာ
    - FORBIDDEN: Thai, Chinese, English, Japanese, Korean, Latin alphabet.
    - If unsure of a word, write 【?term?】 — do NOT use English or Chinese.
    - Return ONLY Myanmar translation. Zero preamble. Zero explanation.
    - CAREFUL: Use correct Myanmar Unicode. DO NOT use wrong characters like "؟" (use "?").

    You are an expert English-to-Myanmar literary translator specializing in Wuxia/Xianxia novels.

    STRICT RULES:
    1. SYNTAX: Convert English SVO structure to natural Myanmar SOV order
    2. TERMINOLOGY: Use EXACT terms from GLOSSARY below. Transliterate pinyin names to Myanmar phonetics.
    3. PARTICLES: Use ၍/ဖြင့် for 'by/with', ၌/မှာ for 'at/in', ကို/အား for object marker, ၏/သည့် for possession
    4. TONE: Use formal/literary Myanmar for narrative. Use natural spoken Myanmar for dialogue.
    5. PRONOUNS: Maintain character register - inferiors use ကျွန်တော်/ကျွန်မ to superiors; superiors use မင်း/နင် to inferiors; equals use သင်/ခင်ဗျား
    6. IDIOMS: Do NOT translate English idioms literally. Find Burmese cultural equivalents.
    7. PLACEHOLDERS: Use 【?term?】 for unknown proper nouns, cultivation terms, or names not in glossary.
    8. NO ENGLISH: Remove all English words. NO CHINESE: Remove all Chinese characters.
    9. ALIASES: Chinese aliases in parentheses help identify characters (e.g., 罗青 = Luo Qing).
    10. MARKDOWN: Preserve all Markdown syntax exactly: # headers, **bold**, *italics*, > quotes, - lists.

    COMPLETE GLOSSARY (USE EXACT MYANMAR TERMS):
    {glossary}

    ENGLISH TEXT:
    {text}

    MYANMAR TRANSLATION:
  
  description: "Pivot: CN→EN→MM using need_fix.md recommended models"

# =====================================================
# PROCESSING SETTINGS - Optimized per need_fix.md
# =====================================================
# Fixed: Sampling parameters mismatch
# Temperature: 0.1-0.3 for consistent, literal translation
# top_p: 0.95
# repeat_penalty: 1.0
processing:
  chunk_size: 1200              # Conservative for stability
  overlap_size: 100             # Context continuity
  max_retries: 3
  temperature: 0.2              # Lower for more consistent, literal translation (0.1-0.3 range)
  top_p: 0.95                   # Nucleus sampling threshold
  top_k: 50                     # Top-k token selection
  repeat_penalty: 1.15          # CRITICAL: Must be 1.1+ to prevent Myanmar character repetition loops
  stream: true
  request_timeout: 300
  rate_limit_delay: 0.5         # Seconds between API calls
  
  # Fixed: Context window & truncation issue
  # Increased num_ctx to 8192 as recommended
  num_ctx: 8192                 # Context window size
  
  # Fixed: Model Loading State - increase keep_alive
  keep_alive: "10m"             # Keep model loaded longer to prevent unload/reload

# =====================================================
# PATHS
# =====================================================
paths:
  input_dir: "data/input"
  output_dir: "data/output"
  books_dir: "books"
  glossary_file: "data/glossary.json"
  context_memory_file: "data/context_memory.json"
  log_file: "logs/translation.log"
  templates_dir: "templates"

# =====================================================
# QUALITY SETTINGS
# =====================================================
myanmar_readability:
  enabled: true
  min_myanmar_ratio: 0.70       # 70% Myanmar characters required
  flag_on_fail: true
  block_on_fail: false

# =====================================================
# OUTPUT FORMAT
# =====================================================
output:
  format: "markdown"
  preserve_formatting: true
  add_metadata: true
  add_translator_notes: false

# =====================================================
# MODEL ROUTER
# =====================================================
# Fixed: Model roles per need_fix.md
model_roles:
  translator: ["alibayram/hunyuan:7b"]
  refiner: ["padauk-gemma:q8_0", "sailor2-20b", "yxchia/seallms-v3-7b:Q4_K_M"]
  checker: ["qwen:7b"]          # JSON and logic checking only
  glossary_sync: ["qwen:7b"]
  qa_final: ["qwen:7b"]

# =====================================================
# QA SETTINGS
# =====================================================
qa_testing:
  enabled: true
  auto_retry: true              # Retry on quality failure
  min_myanmar_ratio: 0.70
  fail_on_placeholders: false   # Allow placeholders for review
  markdown_strict: true
