# Pivot Language Configuration
# Chinese → English → Myanmar (Two-stage pipeline for better quality)
# =====================================================
# This config uses English as a bridge language for better translation quality
# Stage 1: Chinese → English (hunyuan:7b - Tencent Chinese-native model)
# Stage 2: English → Myanmar (seallms-v3-7b - SEA language specialist)

project:
  name: "novel_translation"
  source_language: "zh-CN"      # Chinese input
  target_language: "my-MM"      # Myanmar output
  novel_genre: "Xianxia/Cultivation"

# =====================================================
# MODEL CONFIGURATION - Pivot Language Approach
# =====================================================
models:
  provider: "ollama"
  
  # Stage 1: Chinese → English (pivot)
  # hunyuan:7b is Tencent's Chinese-native model with ~95% CN→EN accuracy
  translator: "alibayram/hunyuan:7b"
  
  # Stage 2: English → Myanmar
  # seallms-v3-7b is trained on 8 SEA languages including Myanmar
  editor: "yxchia/seallms-v3-7b:Q4_K_M"
  refiner: "yxchia/seallms-v3-7b:Q4_K_M"
  checker: "qwen:7b"            # qwen:7b for consistency check and QA
  
  ollama_base_url: "http://localhost:11434"
  timeout: 300                  # API call timeout (5 minutes)

# =====================================================
# TWO-STAGE TRANSLATION PIPELINE
# =====================================================
translation_pipeline:
  mode: "two_stage"
  
  # Stage 1: Chinese → English (pivot language)
  stage1_model: "alibayram/hunyuan:7b"
  stage1_source_lang: "chinese"
  stage1_target_lang: "english"
  
  # Stage 2: English → Myanmar (final output)
  stage2_model: "yxchia/seallms-v3-7b:Q4_K_M"
  stage2_source_lang: "english"
  stage2_target_lang: "myanmar"
  
  description: "Pivot language approach: CN→EN→MM for better quality"

# =====================================================
# PROCESSING SETTINGS
# =====================================================
# Optimized for Ryzen 7 5700X / 16GB RAM / CPU-only
processing:
  chunk_size: 1200              # Safe for 7B models (larger causes repetition)
  overlap_size: 100             # Context continuity
  max_retries: 3
  temperature: 0.45             # Balanced: not too rigid, not too creative
  top_p: 0.92
  top_k: 50
  repeat_penalty: 1.3           # CRITICAL: prevents repetition loops
  stream: true
  request_timeout: 300          # Must match models.timeout

# =====================================================
# PATHS
# =====================================================
paths:
  input_dir: "data/input"
  output_dir: "data/output"
  books_dir: "books"
  glossary_file: "data/glossary.json"
  context_memory_file: "data/context_memory.json"
  log_file: "logs/translation.log"
  templates_dir: "templates"

# =====================================================
# QUALITY SETTINGS
# =====================================================
myanmar_readability:
  enabled: true
  min_myanmar_ratio: 0.70       # 70% Myanmar characters required
  flag_on_fail: true
  block_on_fail: false

# =====================================================
# OUTPUT FORMAT
# =====================================================
output:
  format: "markdown"
  preserve_formatting: true
  add_metadata: true
  add_translator_notes: false

# =====================================================
# MODEL ROUTER (Disabled - fixed pipeline)
# =====================================================
model_router:
  enabled: false
  vram_budget_gb: 16.0
  retry_on_failure: true
  max_fallback_depth: 2
  
model_roles:
  # Fixed pipeline - no fallback needed
  translator: ["alibayram/hunyuan:7b"]
  refiner: ["yxchia/seallms-v3-7b:Q4_K_M"]
  checker: ["qwen:7b"]
  glossary_sync: ["qwen:7b"]
  qa_final: ["qwen:7b"]

# =====================================================
# QA SETTINGS
# =====================================================
qa_testing:
  enabled: true
  auto_retry: false
  min_myanmar_ratio: 0.70
  fail_on_placeholders: false   # Allow 【?term?】 placeholders
  markdown_strict: true

# =====================================================
# GLOSSARY V3 SETTINGS
# =====================================================
glossary_v3:
  enabled: true
  path: "data/glossary_v3.json"
  max_prompt_entries: 40
  priority_threshold: 2
  include_examples: false
  track_usage: true
  alias_matching: true
  exception_rules: true
  prompt_format: "markdown"
  show_pronunciation: false
  show_exceptions_count: true
  cache_ttl_minutes: 30
  lazy_load: true
