# Pivot Language Configuration - USE AVAILABLE MODELS ONLY
# Chinese → English → Myanmar (Two-stage pipeline)
# =====================================================
# ⚠️ IMPORTANT: Use this config ONLY for Chinese source files!
# For English sources, use settings.english.yaml instead!
#
# UPDATED: Using only models confirmed available in ollama list:
#   - qwen2.5:14b (9GB) - Stage 1: CN→EN
#   - qwen:7b (8.1GB) - Stage 2: EN→MM
#   - gemma:7b (5GB) - Fallback

project:
  name: "novel_translation"
  source_language: "zh-CN"      # Chinese input
  target_language: "my-MM"      # Myanmar output
  novel_genre: "Xianxia/Cultivation"

# =====================================================
# MODEL CONFIGURATION - Using Available Models Only
# =====================================================
# From ollama_model_list.md:
# Available: qwen2.5:14b, qwen:7b, gemma:7b, hunyuan:7b, seallms-v3-7b, translategemma:12b

models:
  provider: "ollama"
  
  # Stage 1: Chinese → English
  # qwen2.5:14b - Excellent Chinese understanding (confirmed available)
  translator: "qwen2.5:14b"     # Chinese → English (9GB)
  
  # Stage 2: English → Myanmar  
  # qwen2.5:14b - Better multilingual capabilities, superior Myanmar output
  editor: "qwen2.5:14b"         # English → Myanmar (9GB)
  refiner: "qwen2.5:14b"        # Refinement (9GB)
  checker: "qwen2.5:7b"         # QA check (4GB) - lightweight for checking
  
  ollama_base_url: "http://localhost:11434"
  timeout: 300                  # API call timeout (5 minutes)

# =====================================================
# TWO-STAGE TRANSLATION PIPELINE
# =====================================================
translation_pipeline:
  mode: "two_stage"
  
  # Stage 1: Chinese → English (pivot)
  stage1_model: "qwen2.5:14b"
  stage1_source_lang: "chinese"
  stage1_target_lang: "english"
  stage1_prompt: |
    You are an expert Chinese-to-English literary translator specializing in Wuxia/Xianxia novels.

    CRITICAL RULES:
    1. PRESERVE all Chinese names in pinyin (e.g., 罗青 → Luo Qing, 小戎镇 → Xiao Rong Town)
    2. PRESERVE all place names in pinyin
    3. PRESERVE all cultivation terms literally (e.g., 神仙 → immortal, 法力 → magical power)
    4. DO NOT translate names to English meanings - keep pinyin for proper nouns
    5. Output ONLY English translation, no explanations, no Chinese characters
    
    GLOSSARY (PRESERVE THESE NAMES IN PINYIN):
    {glossary}
    
    CHINESE TEXT:
    {text}
    
    ENGLISH TRANSLATION:
  
  # Stage 2: English → Myanmar (final output)
  stage2_model: "qwen:7b"
  stage2_source_lang: "english"
  stage2_target_lang: "myanmar"
  stage2_prompt: |
    CRITICAL LANGUAGE RULE — READ FIRST:
    - Output language: Myanmar (Burmese) ONLY.
    - Script: Myanmar Unicode (U+1000–U+109F). Example: မြန်မာဘာသာ
    - FORBIDDEN: Thai, Chinese, English, Japanese, Korean, Latin alphabet.
    - If unsure of a word, write 【?term?】 — do NOT use English or Chinese.
    - Return ONLY Myanmar translation. Zero preamble. Zero explanation.
    - CAREFUL: Use correct Myanmar Unicode. DO NOT use wrong characters like "؟" (use "?").

    You are an expert English-to-Myanmar literary translator specializing in Wuxia/Xianxia novels.

    STRICT RULES:
    1. SYNTAX: Convert English SVO structure to natural Myanmar SOV order
    2. TERMINOLOGY: Use EXACT terms from GLOSSARY below. Transliterate pinyin names to Myanmar phonetics.
    3. TONE: Use formal/literary Myanmar for narrative. Use natural spoken Myanmar for dialogue (pronouns: မင်း, ရှင်, ကျွန်တော်/ကျွန်မ based on status).
    4. IDIOMS: Do NOT translate English idioms literally. Find Burmese cultural equivalents.
    5. PLACEHOLDERS: Use 【?term?】 for unknown proper nouns, cultivation terms, or names not in glossary.
    6. NO ENGLISH: Remove all English words. NO CHINESE: Remove all Chinese characters.
    7. ALIASES: Chinese aliases in parentheses help identify characters (e.g., 罗青 = Luo Qing).
    
    COMPLETE GLOSSARY (USE EXACT MYANMAR TERMS):
    {glossary}
    
    ENGLISH TEXT:
    {text}
    
    MYANMAR TRANSLATION:
  
  description: "Pivot: CN→EN→MM using available models (qwen2.5:14b + qwen:7b)"

# =====================================================
# PROCESSING SETTINGS
# =====================================================
processing:
  chunk_size: 1200              # Conservative for stability
  overlap_size: 100             # Context continuity
  max_retries: 3
  temperature: 0.3              # Lower for accuracy
  top_p: 0.92
  top_k: 50
  repeat_penalty: 1.15          # Prevents repetition loops
  stream: true
  request_timeout: 300
  rate_limit_delay: 0.5         # Seconds between API calls

# =====================================================
# PATHS
# =====================================================
paths:
  input_dir: "data/input"
  output_dir: "data/output"
  books_dir: "books"
  glossary_file: "data/glossary.json"
  context_memory_file: "data/context_memory.json"
  log_file: "logs/translation.log"
  templates_dir: "templates"

# =====================================================
# QUALITY SETTINGS
# =====================================================
myanmar_readability:
  enabled: true
  min_myanmar_ratio: 0.70       # 70% Myanmar characters required
  flag_on_fail: true
  block_on_fail: false

# =====================================================
# OUTPUT FORMAT
# =====================================================
output:
  format: "markdown"
  preserve_formatting: true
  add_metadata: true
  add_translator_notes: false

# =====================================================
# MODEL ROUTER
# =====================================================
model_router:
  enabled: true
  vram_budget_gb: 16.0          # Need for 14B + 7B sequential loading
  retry_on_failure: true
  max_fallback_depth: 2

model_roles:
  translator: ["qwen2.5:14b", "qwen2.5:7b"]
  refiner: ["qwen2.5:14b"]
  checker: ["qwen2.5:7b", "qwen:7b"]
  glossary_sync: ["qwen2.5:7b"]
  qa_final: ["qwen2.5:7b"]

# =====================================================
# QA SETTINGS
# =====================================================
qa_testing:
  enabled: true
  auto_retry: true              # Retry on quality failure
  min_myanmar_ratio: 0.70
  fail_on_placeholders: false   # Allow placeholders for review
  markdown_strict: true

# =====================================================
# GLOSSARY V3 SETTINGS
# =====================================================
glossary_v3:
  enabled: true
  path: "data/glossary.json"    # Use standard glossary
  max_prompt_entries: 60        # All glossary terms fit in prompt
  priority_threshold: 2
  include_examples: false
  track_usage: true
  alias_matching: true
  exception_rules: true
  prompt_format: "markdown"
  show_pronunciation: false
  show_exceptions_count: true
  cache_ttl_minutes: 30
  lazy_load: true
