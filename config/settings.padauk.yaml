glossary_v3:
  alias_matching: true
  cache_ttl_minutes: 30
  enabled: true
  exception_rules: true
  include_examples: false
  lazy_load: true
  max_prompt_entries: 40
  path: data/glossary_v3.json
  priority_threshold: 2
  prompt_format: markdown
  show_exceptions_count: true
  show_pronunciation: false
  track_usage: true
model_roles:
  checker:
  - qwen:7b
  - gemma:7b
  glossary_sync:
  - qwen:7b
  qa_final:
  - qwen:7b
  - gemma:7b
  refiner:
  - qwen2.5:14b
  - qwen:7b
  translator:
  - qwen2.5:14b
  - qwen2.5:7b
  - qwen:7b
model_router:
  enabled: true
  max_fallback_depth: 2
  retry_on_failure: true
  vram_budget_gb: 16.0
models:
  checker: qwen:7b
  cloud_model: gemini-2.5-flash
  editor: padauk-gemma:q8_0
  ollama_base_url: http://localhost:11434
  provider: ollama
  refiner: padauk-gemma:q8_0
  timeout: 300
  translator: padauk-gemma:q8_0
myanmar_readability:
  block_on_fail: false
  enabled: true
  flag_on_fail: true
  min_myanmar_ratio: 0.7
output:
  add_metadata: true
  add_translator_notes: false
  format: markdown
  preserve_formatting: true
paths:
  books_dir: books
  context_memory_file: data/context_memory.json
  glossary_file: data/glossary.json
  input_dir: data/input
  log_file: logs/translation.log
  output_dir: data/output
  templates_dir: templates
processing:
  chunk_overlap: 0
  chunk_size: 150
  max_retries: 3
  repeat_penalty: 1.1
  request_timeout: 900
  stream: true
  temperature: 0.2
  top_k: 50
  top_p: 0.92
project:
  name: novel_translation
  novel_genre: Xianxia/Cultivation
  source_language: zh-CN
  target_language: my-MM
qa_testing:
  auto_retry: false
  enabled: true
  fail_on_placeholders: false
  markdown_strict: true
  min_myanmar_ratio: 0.7
translation_pipeline:
  description: 'Pivot translation: CN -> EN (Hunyuan) -> MM (Padauk-Gemma)'
  mode: two_stage
  stage1_model: alibayram/hunyuan:7b
  stage1_prompt: 'You are an expert Chinese-to-English literary translator specializing
    in Wuxia/Xianxia novels.


    CRITICAL RULES:

    1. PRESERVE all Chinese names in pinyin (e.g., 罗青 → Luo Qing, 小戎镇 → Xiao Rong
    Town)

    2. PRESERVE all place names in pinyin

    3. PRESERVE all cultivation terms literally (e.g., 神仙 → immortal, 法力 → magical
    power)

    4. DO NOT translate names to English meanings - keep pinyin for proper nouns

    5. Output ONLY English translation, no explanations, no Chinese characters


    GLOSSARY (PRESERVE THESE NAMES IN PINYIN):

    {glossary}


    CHINESE TEXT:

    {text}


    ENGLISH TRANSLATION:

    '
  stage1_source_lang: chinese
  stage1_target_lang: english
  stage2_model: padauk-gemma:q8_0
  stage2_prompt: 'CRITICAL LANGUAGE RULE — READ FIRST:

    - Output language: Myanmar (Burmese) ONLY.

    - Script: Myanmar Unicode (U+1000–U+109F). Example: မြန်မာဘာသာ

    - FORBIDDEN: Thai, Chinese, English, Japanese, Korean, Latin alphabet.

    - If unsure of a word, write 【?term?】 — do NOT use English or Chinese.

    - Return ONLY Myanmar translation. Zero preamble. Zero explanation.

    - CAREFUL: Use correct Myanmar Unicode. DO NOT use wrong characters like "؟" (use
    "?").


    You are an expert English-to-Myanmar literary translator specializing in Wuxia/Xianxia
    novels.


    STRICT RULES:

    1. SYNTAX: Convert English SVO structure to natural Myanmar SOV order

    2. TERMINOLOGY: Use EXACT terms from GLOSSARY below. Transliterate pinyin names
    to Myanmar phonetics.

    3. TONE: Use formal/literary Myanmar for narrative. Use natural spoken Myanmar
    for dialogue (pronouns: မင်း, ရှင်, ကျွန်တော်/ကျွန်မ based on status).

    4. IDIOMS: Do NOT translate English idioms literally. Find Burmese cultural equivalents.

    5. PLACEHOLDERS: Use 【?term?】 for unknown proper nouns, cultivation terms, or
    names not in glossary.

    6. NO ENGLISH: Remove all English words. NO CHINESE: Remove all Chinese characters.

    7. ALIASES: Chinese aliases in parentheses help identify characters (e.g., 罗青
    = Luo Qing).


    COMPLETE GLOSSARY (USE EXACT MYANMAR TERMS):

    {glossary}


    ENGLISH TEXT:

    {text}


    MYANMAR TRANSLATION:

    '
  stage2_source_lang: english
  stage2_target_lang: myanmar
