# config.yaml

project:
  name: "my_story_translation"
  source_language: "zh-CN"
  target_language: "my-MM"
  novel_genre: "Xianxia/Cultivation" # Wuxia, Romance, Horror စသည်ဖြင့် သတ်မှတ်ပါ

models:
  translator: "alibayram/hunyuan:7b"       # Main translation model
  editor: "qwen2.5:14b"           # Polishing model
  checker: "qwen:7b"              # Fast consistency check
  ollama_base_url: "http://localhost:11434"

processing:
  chunk_size: 500                 # Characters per chunk (too large = loss of context)
  overlap_size: 50                # Overlap between chunks for continuity
  max_retries: 3                  # Retry if API fails
  temperature: 0.3                # Lower temp = more consistent/accurate translation

output:
  format: "markdown"
  preserve_formatting: true
  add_translator_notes: false     # If true, adds AI comments in <!-- --> tags


