# FAST Translation Configuration (Pivot Language)
# Optimized for speed with Ollama - Two-stage using English as bridge
# =====================================================
# Hardware: Ryzen 7 5700X / 16GB RAM / CPU-only
# Strategy: CN → EN → MM (better quality than direct CN → MM)

project:
  name: "novel_translation"
  source_language: "zh-CN"      # Chinese input
  target_language: "my-MM"      # Myanmar output
  novel_genre: "Xianxia/Cultivation"

# =====================================================
# MODEL CONFIGURATION - 7B Models for 16GB RAM
# =====================================================
models:
  provider: "ollama"
  
  # Stage 1: Chinese → English (pivot)
  # hunyuan:7b is Tencent's Chinese-native model, ~95% CN→EN accuracy
  translator: "alibayram/hunyuan:7b"
  
  # Stage 2: English → Myanmar
  # seallms-v3-7b is SEA language specialist, trained on 8 languages
  editor: "yxchia/seallms-v3-7b:Q4_K_M"
  refiner: "yxchia/seallms-v3-7b:Q4_K_M"
  checker: "qwen:7b"
  
  ollama_base_url: "http://localhost:11434"
  timeout: 300                  # 5 minutes for two-stage translation

# =====================================================
# TWO-STAGE PIPELINE (Using English as Bridge)
# =====================================================
# Why pivot? Local 7B/14B models lack direct CN→MM training data.
# Solution: CN → EN (hunyuan:7b) → MM (seallms-v3-7b)
# Performance: ~18-27 min/chapter on Ryzen 7 5700X

translation_pipeline:
  mode: "two_stage"
  
  # Stage 1: Chinese → English
  stage1_model: "alibayram/hunyuan:7b"
  stage1_source_lang: "chinese"
  stage1_target_lang: "english"
  
  # Stage 2: English → Myanmar
  stage2_model: "yxchia/seallms-v3-7b:Q4_K_M"
  stage2_source_lang: "english"
  stage2_target_lang: "myanmar"
  
  description: "Two-stage with English pivot for quality"

# =====================================================
# PROCESSING SETTINGS
# =====================================================
# Optimized for CPU-only Ryzen 7 5700X
processing:
  chunk_size: 1200              # 7B model safe range
  overlap_size: 100             # Context continuity
  max_retries: 3
  temperature: 0.45             # Balanced creativity
  top_p: 0.92
  top_k: 50
  repeat_penalty: 1.3           # CRITICAL: prevents repetition
  stream: true
  request_timeout: 300          # Must match models.timeout
  
  # Hardware optimization
  num_thread: 14                # Ryzen 7 5700X has 16 threads
  num_ctx: 4096

# =====================================================
# PATHS
# =====================================================
paths:
  input_dir: "data/input"
  output_dir: "data/output"
  books_dir: "books"
  glossary_file: "data/glossary.json"
  context_memory_file: "data/context_memory.json"
  log_file: "logs/translation.log"
  templates_dir: "templates"

# =====================================================
# QUALITY SETTINGS
# =====================================================
myanmar_readability:
  enabled: true
  min_myanmar_ratio: 0.70
  flag_on_fail: true
  block_on_fail: false

# =====================================================
# OUTPUT FORMAT
# =====================================================
output:
  format: "markdown"
  preserve_formatting: true
  add_metadata: true
  add_translator_notes: false

# =====================================================
# MODEL ROUTER
# =====================================================
model_roles:
  translator: ["alibayram/hunyuan:7b"]
  refiner: ["yxchia/seallms-v3-7b:Q4_K_M"]
  checker: ["qwen:7b"]

qa_testing:
  enabled: true
  auto_retry: false
  min_myanmar_ratio: 0.70
  fail_on_placeholders: false
  markdown_strict: true
