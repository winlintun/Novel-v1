# FAST Translation Configuration
# Optimized for speed with Ollama - Single stage, smaller model, batch processing
# =====================================================

project:
  name: "novel_translation"
  source_language: "zh-CN"
  target_language: "my-MM"
  novel_genre: "Xianxia/Cultivation"

# =====================================================
# FAST MODEL CONFIGURATION
# =====================================================
models:
  provider: "ollama"
  
  # FAST Models (using available models)
  translator: "qwen2.5:14b"     # Available model - 14B variant
  editor: "qwen2.5:14b"
  refiner: "qwen:7b"            # Lightweight refinement
  checker: "qwen:7b"
  ollama_base_url: "http://localhost:11434"
  timeout: 120                  # Shorter timeout (2 min vs 5 min)
  
# =====================================================
# SINGLE STAGE = 2x FASTER
# Skip the refinement stage - translate in one pass
# =====================================================
translation_pipeline:
  mode: "single_stage"          # FAST: No separate refinement stage
  stage1_model: "qwen2.5:14b"
  stage2_model: "qwen2.5:14b"
  description: "Single-stage for maximum speed"

# =====================================================
# FAST PROCESSING SETTINGS
# =====================================================
processing:
  chunk_size: 1500              # Balanced: prevents context loss vs speed
  chunk_overlap: 100            # Higher overlap for smooth transitions
  max_retries: 3                # More retries for better quality
  temperature: 0.3              # Lower = more deterministic, less repetition
  top_p: 0.85
  top_k: 30
  repeat_penalty: 1.25          # HIGHER = prevents repetition loops (CRITICAL)
  stream: true                  # Enable streaming
  request_timeout: 180          # 3 minutes max
  
  # Validation settings (NEW)
  validation:
    enabled: true
    max_repetition_ratio: 0.35    # If >35% repeated sentences, retry
    min_myanmar_ratio: 0.65       # Minimum Myanmar character ratio
  
  # BATCH PROCESSING (NEW)
  batch_processing:
    enabled: true
    batch_size: 5               # Process 5 paragraphs at once
    max_batch_chars: 2000       # Max chars per batch

# =====================================================
# PATHS
# =====================================================
paths:
  input_dir: "data/input"
  output_dir: "data/output"
  books_dir: "books"
  glossary_file: "data/glossary.json"
  context_memory_file: "data/context_memory.json"
  log_file: "logs/translation.log"
  templates_dir: "templates"

# =====================================================
# QUALITY SETTINGS (Relaxed for speed)
# =====================================================
myanmar_readability:
  enabled: true
  min_myanmar_ratio: 0.6        # Lower threshold = less reprocessing
  flag_on_fail: true
  block_on_fail: false

# =====================================================
# OUTPUT FORMAT
# =====================================================
output:
  format: "markdown"
  preserve_formatting: true
  add_metadata: true
  add_translator_notes: false

# =====================================================
# Model Router (Disabled for speed)
# =====================================================
model_router:
  enabled: false                # Disable for speed
  vram_budget_gb: 8.0
  retry_on_failure: true
  max_fallback_depth: 1
  
model_roles:
  translator: ["qwen2.5:14b"]
  refiner: ["qwen:7b"]
  checker: ["qwen:7b"]

qa_testing:
  enabled: false                # Disable QA for speed
  auto_retry: false
  min_myanmar_ratio: 0.60
  fail_on_placeholders: false
  markdown_strict: false
