# English to Myanmar Translation Configuration
# Direct translation for English source novels
# =====================================================
# Use this config when your source files are ALREADY in English
# DO NOT use this for Chinese sources - use settings.pivot.yaml instead!
#
# Per need_fix.md:
#   - Translator & Editor: modes/padauk-gemma-q8_0.gguf (direct EN→MM)
#   - Checker/QA: qwen:7b (JSON and logic checking only)

project:
  name: "novel_translation"
  source_language: "en-US"      # English input
  target_language: "my-MM"      # Myanmar output
  novel_genre: "Xianxia/Cultivation"

# =====================================================
# MODEL CONFIGURATION - English → Myanmar
# =====================================================
# Per need_fix.md:
#   - padauk-gemma:q8_0 for direct EN→MM (single-stage)
#   - qwen:7b for Checker/QA (JSON and logic)
#
# NOTE: Do NOT use qwen2.5:14b or translategemma:12b (16GB RAM issue)
# NOTE: Do NOT use gemma:7b (not good for Myanmar)

models:
  provider: "ollama"
  
  # Single-Stage: English → Myanmar direct translation
  # Using padauk-gemma:q8_0 as recommended in need_fix.md
  translator: "padauk-gemma:q8_0"
  editor: "padauk-gemma:q8_0"
  refiner: "padauk-gemma:q8_0"
  
  # Checker/QA: qwen:7b (per need_fix.md)
  # Good at JSON reading and logic checking
  # DO NOT use for Myanmar text generation
  checker: "qwen:7b"
  
  ollama_base_url: "http://localhost:11434"
  timeout: 300

# =====================================================
# TRANSLATION MODE
# =====================================================
# SINGLE_STAGE: Direct translation in one pass
#   - Faster and more efficient for EN→MM
#   - padauk-gemma:q8_0 is optimized for this
#
# For better quality, you can use TWO_STAGE:
#   Stage 1: Raw translation (English → Myanmar)
#   Stage 2: Literary rewrite (improve flow and style)
# =====================================================
translation_pipeline:
  mode: "single_stage"          # Single-stage for direct EN→MM
  stage1_model: "padauk-gemma:q8_0"
  stage2_model: "padauk-gemma:q8_0"
  description: "Single-stage EN→MM using padauk-gemma:q8_0 (per need_fix.md)"

  # CRITICAL: LANGUAGE_GUARD for Myanmar-only output (Reviewer B fix)
  stage1_prompt: |
    CRITICAL LANGUAGE RULE — READ FIRST:
    - Output language: Myanmar (Burmese) ONLY.
    - Script: Myanmar Unicode (U+1000–U+109F). Example: မြန်မာဘာသာ
    - FORBIDDEN: Thai, Chinese, English, Japanese, Korean, Latin alphabet.
    - If unsure of a word, write 【?term?】 — do NOT use English or Chinese.
    - Return ONLY Myanmar translation. Zero preamble. Zero explanation.
    - CAREFUL: Use correct Myanmar Unicode. DO NOT use wrong characters like "؟" (use "?").

    You are an expert English-to-Myanmar literary translator specializing in Wuxia/Xianxia novels.

    STRICT RULES:
    1. SYNTAX: Convert English SVO structure to natural Myanmar SOV order
    2. TERMINOLOGY: Use EXACT terms from GLOSSARY below. Transliterate pinyin names to Myanmar phonetics.
    3. TONE: Use formal/literary Myanmar for narrative. Use natural spoken Myanmar for dialogue.
    4. PARTICLES: Use ၍/ဖြင့် for 'by/with', ၌/မှာ for 'at/in', ကို/အား for object marker, ၏/သည့် for possession
    5. PRONOUNS: Maintain character register - inferiors use ကျွန်တော်/ကျွန်မ to superiors; superiors use မင်း/နင် to inferiors; equals use သင်/ခင်ဗျား
    6. IDIOMS: Do NOT translate English idioms literally. Find Burmese cultural equivalents.
    7. PLACEHOLDERS: Use 【?term?】 for unknown proper nouns, cultivation terms, or names not in glossary.
    8. NO ENGLISH: Remove all English words. NO CHINESE: Remove all Chinese characters.
    9. MARKDOWN: Preserve all Markdown syntax exactly: # headers, **bold**, *italics*, > quotes, - lists.

    GLOSSARY (USE EXACT MYANMAR TERMS):
    {glossary}

    ENGLISH TEXT:
    {text}

    MYANMAR TRANSLATION:

# =====================================================
# PROCESSING SETTINGS - Optimized per need_fix.md
# =====================================================
# Fixed: Sampling parameters mismatch
# Temperature: 0.1-0.3 for consistent translation
# top_p: 0.95
# repeat_penalty: 1.0
processing:
  chunk_size: 1500              # Characters per chunk
  chunk_overlap: 50             # Overlap between chunks for context
  max_retries: 3                # Retry failed chunks
  temperature: 0.2              # Lower for more deterministic output (0.1-0.3 range)
  top_p: 0.95                   # Nucleus sampling
  top_k: 50                     # Top-k token selection
  repeat_penalty: 1.15          # CRITICAL: Must be 1.1+ to prevent Myanmar character repetition loops
  stream: true
  request_timeout: 900          # Seconds
  
  # Fixed: Context window & truncation issue
  num_ctx: 8192                 # Increased from default per need_fix.md
  
  # Fixed: Model Loading State - increase keep_alive
  keep_alive: "10m"             # Keep model loaded longer

# =====================================================
# PATHS
# =====================================================
paths:
  input_dir: "data/input"
  output_dir: "data/output"
  books_dir: "books"
  glossary_file: "data/glossary.json"
  context_memory_file: "data/context_memory.json"
  log_file: "logs/translation.log"
  templates_dir: "templates"

# =====================================================
# QUALITY SETTINGS
# =====================================================
myanmar_readability:
  enabled: true
  min_myanmar_ratio: 0.70       # 70% of text should be Myanmar script
  flag_on_fail: true
  block_on_fail: false

# =====================================================
# OUTPUT FORMAT
# =====================================================
output:
  format: "markdown"
  preserve_formatting: true     # Keep chapter headers, italics, bold
  add_metadata: true            # Add translation info header
  add_translator_notes: false

# =====================================================
# MODEL ROUTER
# =====================================================
model_router:
  enabled: true
  vram_budget_gb: 16.0          # Adjust based on your GPU
  retry_on_failure: true
  max_fallback_depth: 2

# Fixed: Model roles per need_fix.md
model_roles:
  translator: ["padauk-gemma:q8_0"]
  refiner: ["padauk-gemma:q8_0"]
  checker: ["qwen:7b"]          # JSON and logic only
  glossary_sync: ["qwen:7b"]
  qa_final: ["qwen:7b"]

# =====================================================
# QA SETTINGS
# =====================================================
qa_testing:
  enabled: true
  auto_retry: false             # Auto-retry refinement if QA fails
  min_myanmar_ratio: 0.70       # Minimum Myanmar character ratio
  fail_on_placeholders: false   # Allow 【?term?】 placeholders
  markdown_strict: true         # Enforce single H1, balanced formatting

# =====================================================
# GLOSSARY V3 SETTINGS
# =====================================================
glossary_v3:
  enabled: true
  path: "data/glossary_v3.json"
  max_prompt_entries: 40
  priority_threshold: 2
  include_examples: false
  track_usage: true
  alias_matching: true
  exception_rules: true
  prompt_format: "markdown"
  show_pronunciation: false
  show_exceptions_count: true
  cache_ttl_minutes: 30
  lazy_load: true
