name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import yaml; print('pyyaml OK')"
          python -c "import pydantic; print('pydantic OK')"
          python -c "import typing_extensions; print('typing_extensions OK')"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --color=yes

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff

      - name: Run Ruff linter
        # TODO: remove || true once codebase is lint-clean
        run: ruff check src/ tests/ --select=E,F,W --ignore=E501,F841 || true

      - name: Compile check (syntax only)
        run: |
          find src tests -name '*.py' -not -path '*/__pycache__/*' -print0 | xargs -0 -n1 python -m py_compile
