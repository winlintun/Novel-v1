{% extends "base.html" %}

{% block title %}Progress - Novel Translation{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">📊 Translation Progress | အောက်ငါးပြင်အကျယ်</h1>
    <p class="page-subtitle">Monitor translation progress across all novels</p>
</div>

<!-- Real-time progress indicator - AT TOP (always visible) -->
<div id="realtimeStatus" class="card" style="margin-bottom: 1.5rem; border: 2px solid #007bff;">
    <h3 class="card-header" style="background: #007bff; color: white;">⚡ Live Translation Progress 
        <button onclick="clearProgress()" class="btn btn-sm btn-light" style="float: right;">Clear</button>
    </h3>
    <div id="liveProgress" class="alert" style="margin-bottom: 0;">
        <strong id="liveStatusText">Loading...</strong>
    </div>
</div>

<script>
let pollInterval = null;

async function clearProgress() {
    await fetch('/api/progress/clear', {method: 'POST'});
    location.reload();
}

async function checkProgress() {
    try {
        const response = await fetch('/api/progress');
        const data = await response.json();
        
        const statusDiv = document.getElementById('realtimeStatus');
        const progressDiv = document.getElementById('liveProgress');
        const statusText = document.getElementById('liveStatusText');
        
        if (data.status === 'idle') {
            statusText.textContent = 'No translation in progress';
            progressDiv.className = 'alert alert-secondary';
            statusDiv.style.borderColor = '#6c757d';
        } else if (data.status === 'completed') {
            statusText.textContent = '✅ Translation completed!';
            progressDiv.className = 'alert alert-success';
            statusDiv.style.borderColor = '#28a745';
            alert('✅ Translation completed! Refresh to see updated progress.');
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        } else {
            statusDiv.style.borderColor = '#007bff';
            
            let html = `<strong>🔄 ${data.novel || 'Unknown'}</strong> - Chapter ${data.chapter || '...'}<br>`;
            html += `Model: ${data.model || 'padauk-gemma:q8_0'}<br>`;
            html += `<em>${data.message || 'Translating...'}</em>`;
            
            if (data.current_chunk && data.total_chunks) {
                const pct = Math.round((data.current_chunk / data.total_chunks) * 100);
                html += `<div class="progress" style="margin-top: 0.5rem;">
                    <div class="progress-bar" style="width: ${pct}%">${pct}%</div>
                </div>`;
            }
            
            progressDiv.innerHTML = html;
            progressDiv.className = 'alert alert-warning';
        }
    } catch (err) {
        console.error('Progress poll error:', err);
    }
}

// Start polling when page loads
document.addEventListener('DOMContentLoaded', function() {
    checkProgress();
    pollInterval = setInterval(checkProgress, 3000);
});

// Stop polling when leaving page
window.addEventListener('beforeunload', function() {
    if (pollInterval) {
        clearInterval(pollInterval);
    }
});
</script>
{% endif %}
{% endblock %}
