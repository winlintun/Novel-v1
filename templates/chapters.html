<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }} - Chapters</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --list-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --list-bg: #1e1e1e;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        .list-group-item {
            background-color: var(--list-bg);
            color: var(--text-color);
            border-color: rgba(0,0,0,0.1);
        }
        .list-group-item:hover {
            background-color: rgba(0,0,0,0.05);
        }
        [data-theme="dark"] .list-group-item {
            border-color: rgba(255,255,255,0.1);
        }
        .current-chapter {
            border-left: 5px solid #007bff;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Novel Reader</a>
            <button class="btn btn-outline-light btn-sm" id="theme-toggle">Toggle Theme</button>
        </div>
    </nav>

    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Library</a></li>
                <li class="breadcrumb-item active" aria-current="page">{{ book.title }}</li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>{{ book.title }}</h1>
            <span class="badge bg-secondary">{{ book.chapters|length }} Chapters</span>
        </div>

        <div class="list-group">
            {% for chapter in book.chapters %}
            <a href="/book/{{ book.id }}/chapter/{{ chapter.number }}" 
               class="list-group-item list-group-item-action d-flex justify-content-between align-items-center {% if chapter.number == progress.chapter_number %}current-chapter{% endif %}">
                <div>
                    <strong>Chapter {{ chapter.number }}</strong>: {{ chapter.title }}
                </div>
                {% if chapter.number == progress.chapter_number %}
                <span class="badge bg-primary rounded-pill">Last Read</span>
                {% endif %}
            </a>
            {% endfor %}
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        body.setAttribute('data-theme', savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
